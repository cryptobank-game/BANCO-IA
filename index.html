<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Digital Bank Premium - App de Banco</title>
    <style>
        /* ============================================
           ESTILOS GLOBAIS E RESET
           ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            max-width: 450px;
            width: 100%;
            background: #0a0a0a;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #1a1a1a;
            transition: all 0.3s ease;
        }

        .header {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: #ffd700;
            padding: 25px 20px;
            border-bottom: 2px solid #ffd70033;
        }

        .greeting {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
            color: #ffd700cc;
        }

        .balance {
            font-size: 2.2rem;
            font-weight: bold;
            margin: 10px 0 5px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .balance-label {
            font-size: 0.8rem;
            opacity: 0.8;
            color: #ffd70099;
        }

        .nav-menu {
            display: flex;
            justify-content: space-around;
            background: #0a0a0a;
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
            flex-wrap: wrap;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 8px 12px;
            border-radius: 12px;
            color: #666;
            flex: 1;
            min-width: 60px;
        }

        .nav-item:hover {
            background: #1a1a1a;
            color: #ffd700;
        }

        .nav-item.active {
            color: #ffd700;
            background: #1a1a1a;
            box-shadow: 0 0 15px rgba(255,215,0,0.2);
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        .nav-label {
            font-size: 0.7rem;
            font-weight: 500;
        }

        .content-area {
            padding: 20px;
            min-height: 450px;
            background: #0a0a0a;
            overflow-y: auto;
            max-height: 70vh;
        }

        .card {
            background: #111111;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 1px solid #1a1a1a;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: #ffd70033;
            box-shadow: 0 5px 20px rgba(255,215,0,0.1);
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ffd700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-amount {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            margin: 10px 0;
        }

        /* Estilo para cartão de crédito */
        .credit-card {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 16px;
            padding: 20px;
            margin-top: 10px;
            border: 1px solid #daa520;
            position: relative;
            overflow: hidden;
        }

        .credit-card::before {
            content: "💳";
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 3rem;
            opacity: 0.1;
        }

        .card-brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .card-number {
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 15px;
            font-family: monospace;
        }

        .card-details {
            display: flex;
            justify-content: space-between;
            color: #999;
            font-size: 0.75rem;
        }

        .card-holder {
            color: #fff;
            font-size: 0.85rem;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .card-limit {
            color: #00ff88;
            font-size: 0.85rem;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #333;
        }

        .btn {
            background: linear-gradient(135deg, #b8860b 0%, #daa520 100%);
            color: #000000;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: linear-gradient(135deg, #daa520 0%, #ffd700 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(218,165,32,0.3);
        }

        .btn:active {
            transform: translateY(0px);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #8b6914 0%, #b8860b 100%);
            color: #ffd700;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #b8860b 0%, #daa520 100%);
            color: #000000;
        }

        .input-group {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            color: #ffd700;
            font-size: 0.8rem;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 10px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #daa520;
            box-shadow: 0 0 5px rgba(218,165,32,0.3);
        }

        .amount-input {
            background: #1a1a1a;
            border: 1px solid #daa520;
            color: #ffd700;
            padding: 8px 12px;
            border-radius: 10px;
            width: 100%;
            font-size: 1rem;
            text-align: center;
        }

        .transactions-list {
            list-style: none;
            color: #ffffff;
        }

        .transactions-list li {
            padding: 8px 0;
            border-bottom: 1px solid #1a1a1a;
            color: #ffffff;
        }

        /* Estilos para o gráfico de rosca */
        .chart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }

        .pie-chart-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
        }

        .pie-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .pie-chart svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .pie-chart path {
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .pie-chart path:hover {
            filter: brightness(1.2);
            stroke: #ffd700;
            stroke-width: 3;
            transition: all 0.3s ease;
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .chart-center-text {
            font-size: 0.85rem;
            color: #ffd700;
            font-weight: 600;
            background: rgba(0,0,0,0.8);
            padding: 5px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .chart-legend {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 5px;
            border-radius: 8px;
        }

        .legend-item:hover {
            background: rgba(218,165,32,0.2);
            transform: translateX(5px);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .legend-label {
            flex: 1;
        }

        .legend-value {
            color: #ffd700;
            font-weight: 600;
        }

        .legend-percent {
            color: #888;
            font-size: 0.7rem;
            margin-left: 5px;
        }

        .international-card-text {
            color: #ffffff;
            line-height: 1.6;
        }

        .notification-text {
            color: #ffffff;
            line-height: 1.6;
        }

        .investment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #1a1a1a;
            color: #ffffff;
        }

        .investment-name {
            font-weight: 600;
            color: #ffd700;
        }

        .investment-profit {
            color: #00ff88;
            font-size: 0.8rem;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #b8860b 0%, #daa520 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #000000;
            box-shadow: 0 0 20px rgba(218,165,32,0.3);
        }

        .profile-info h3 {
            font-size: 1.2rem;
            color: #ffd700;
        }

        .profile-info p {
            color: #999;
            font-size: 0.85rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .info-label {
            color: #ffd700;
            font-weight: 600;
        }

        .info-value {
            color: #ffffff;
        }

        /* Modal para transações */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0a0a0a;
            border-radius: 25px;
            max-width: 400px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid #daa520;
            box-shadow: 0 10px 40px rgba(218,165,32,0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            padding: 20px;
            border-bottom: 2px solid #daa520;
            border-radius: 23px 23px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: #ffd700;
            font-size: 1.3rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: #ffd700;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            margin: 0;
            padding: 0 10px;
            line-height: 1;
        }

        .close-modal:hover {
            transform: scale(1.2);
            color: #fff;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ffd700;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #daa520;
            box-shadow: 0 0 5px rgba(218,165,32,0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-cancel {
            background: linear-gradient(135deg, #333 0%, #444 100%);
            color: #fff;
        }

        .btn-cancel:hover {
            background: linear-gradient(135deg, #444 0%, #555 100%);
        }

        .limit-info {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            text-align: center;
        }

        .limit-info span {
            color: #00ff88;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .suggestion-item {
            background: #0d0d0d;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 3px solid #daa520;
            transition: all 0.3s ease;
        }

        .suggestion-item:hover {
            transform: translateX(5px);
            background: #111111;
        }

        .suggestion-title {
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .suggestion-desc {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .suggestion-tag {
            display: inline-block;
            background: #1a1a1a;
            color: #daa520;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 12px;
            margin-top: 8px;
        }

        .rating {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .star {
            color: #ffd700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .star:hover {
            transform: scale(1.2);
        }

        hr {
            border-color: #1a1a1a;
            margin: 15px 0;
        }

        /* Estilos do AurumIA */
        .company-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }

        .company-tabs button {
            background: #181818;
            border: 1px solid #2a2410;
            color: #9a9080;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: .2s;
        }

        .company-tabs button:hover {
            color: #d4af37;
            border-color: #8a6f1f;
        }

        .company-tabs button.active {
            background: linear-gradient(135deg, #d4af37, #f1c75b);
            color: #000;
            border-color: #d4af37;
            font-weight: 600;
        }

        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 18px;
        }

        .company-header h2 {
            font-size: 24px;
            color: #d4af37;
        }

        .company-header .ticker {
            color: #9a9080;
            font-size: 13px;
            letter-spacing: 2px;
        }

        .company-header .sector {
            display: inline-block;
            background: rgba(212, 175, 55, .1);
            color: #d4af37;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 6px;
            border: 1px solid #8a6f1f;
        }

        .company-header .price {
            text-align: right;
        }

        .company-header .price b {
            font-size: 28px;
            color: #d4af37;
            display: block;
        }

        .variation-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 8px;
        }

        @media (max-width: 680px) {
            .variation-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .var-card {
            background: #181818;
            border: 1px solid #2a2410;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .var-card .pl {
            color: #9a9080;
            font-size: 11px;
            text-transform: uppercase;
        }

        .var-card .pv {
            font-size: 17px;
            font-weight: 700;
            margin-top: 4px;
        }

        .pv.up {
            color: #3ecf8e;
        }

        .pv.down {
            color: #ef4444;
        }

        .dividend-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .div-item {
            background: #181818;
            border: 1px solid #2a2410;
            border-radius: 10px;
            padding: 12px;
            border-left: 3px solid #d4af37;
        }

        .div-item .month {
            color: #9a9080;
            font-size: 11px;
            text-transform: uppercase;
        }

        .div-item .pct {
            color: #3ecf8e;
            font-weight: 700;
            font-size: 18px;
            margin: 4px 0;
        }

        .div-item .rpc {
            color: #f5f1e6;
            font-size: 13px;
        }

        .holdings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .holdings-table th,
        .holdings-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2410;
            font-size: 14px;
        }

        .holdings-table th {
            color: #d4af37;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .reco-card {
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #d4af37;
            background: #181818;
        }

        .reco-card.buy {
            border-left-color: #3ecf8e;
        }

        .reco-card.sell {
            border-left-color: #ef4444;
        }

        .reco-card.hold {
            border-left-color: #d4af37;
        }

        .reco-card .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-right: 8px;
        }

        .tag.buy {
            background: rgba(62, 207, 142, .15);
            color: #3ecf8e;
        }

        .tag.sell {
            background: rgba(239, 68, 68, .15);
            color: #ef4444;
        }

        .tag.hold {
            background: rgba(212, 175, 55, .15);
            color: #d4af37;
        }

        .chat-box {
            background: #0d0d0d;
            border: 1px solid #2a2410;
            border-radius: 12px;
            height: 340px;
            overflow-y: auto;
            padding: 16px;
            margin-bottom: 12px;
        }

        .msg {
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
        }

        .msg .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }

        .msg.ai .avatar {
            background: linear-gradient(135deg, #d4af37, #f1c75b);
            color: #000;
        }

        .msg.user .avatar {
            background: #2a2a2a;
            color: #d4af37;
        }

        .msg .bubble {
            background: #181818;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            max-width: 80%;
            line-height: 1.5;
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        .msg.user .bubble {
            background: rgba(212, 175, 55, .1);
            border: 1px solid #8a6f1f;
        }

        .chat-input {
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            background: #0d0d0d;
            border: 1px solid #2a2410;
            color: #f5f1e6;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }

        .chat-input input:focus {
            border-color: #d4af37;
        }

        .disclaimer {
            background: rgba(239, 68, 68, .08);
            border: 1px solid #5a2020;
            border-radius: 10px;
            padding: 12px;
            font-size: 12px;
            color: #ffb4b4;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-bg.show {
            display: flex;
        }

        .modal-trade {
            background: #141414;
            border: 1px solid #8a6f1f;
            border-radius: 14px;
            padding: 24px;
            max-width: 420px;
            width: 100%;
        }

        .modal-trade h3 {
            color: #d4af37;
            margin-bottom: 16px;
        }

        .modal-trade label {
            display: block;
            margin: 10px 0 4px;
            font-size: 13px;
            color: #9a9080;
        }

        .modal-trade input,
        .modal-trade select {
            width: 100%;
            padding: 10px;
            background: #0d0d0d;
            border: 1px solid #2a2410;
            color: #f5f1e6;
            border-radius: 8px;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .app-container {
                border-radius: 0;
            }
            .nav-label {
                font-size: 0.6rem;
            }
            .nav-icon {

    let tradeCtx = null;
    function openTrade(ticker, op) {
        const c = COMPANIES.find(x => x.ticker === ticker);
        if (!c) return;
        tradeCtx = c;
        document.getElementById("tradeTitle").textContent = (op === "buy" ? "Comprar " : "Vender ") + c.name;
        document.getElementById("tradeOp").value = op;
        document.getElementById("tradeQty").value = 1;
        document.getElementById("tradePrice").textContent = fmt(c.price);
        document.getElementById("tradeMsg").textContent = "";
        updateTradeTotal();
        document.getElementById("tradeModal").classList.add("show");
    }
    
    function closeTrade() { document.getElementById("tradeModal").classList.remove("show"); }
    
    function updateTradeTotal() {
        const q = parseInt(document.getElementById("tradeQty").value) || 0;
        if (tradeCtx) document.getElementById("tradeTotal").textContent = fmt(tradeCtx.price * q);
    }
    
    function confirmTrade() {
        if (!tradeCtx) return;
        const q = parseInt(document.getElementById("tradeQty").value);
        const op = document.getElementById("tradeOp").value;
        const c = tradeCtx;
        const msg = document.getElementById("tradeMsg");
        if (!q || q < 1) { msg.textContent = "Quantidade inválida."; return; }
        const total = c.price * q;
        if (op === "buy") {
            if (total > cash) { msg.textContent = "Saldo insuficiente."; return; }
            cash -= total;
            if (portfolio[c.ticker]) {
                const cur = portfolio[c.ticker];
                const newQty = cur.qty + q;
                portfolio[c.ticker] = { qty: newQty, avg: ((cur.avg * cur.qty) + (c.price * q)) / newQty };
            } else {
                portfolio[c.ticker] = { qty: q, avg: c.price };
            }
        } else {
            if (!portfolio[c.ticker] || portfolio[c.ticker].qty < q) { msg.textContent = "Você não tem cotas suficientes."; return; }
            cash += total;
            portfolio[c.ticker].qty -= q;
            if (portfolio[c.ticker].qty === 0) delete portfolio[c.ticker];
        }
        
        const now = new Date();
        const dd = String(now.getDate()).padStart(2, "0");
        const mm = String(now.getMonth() + 1).padStart(2, "0");
        const yy = now.getFullYear();
        const hh = String(now.getHours()).padStart(2, "0");
        const mi = String(now.getMinutes()).padStart(2, "0");
        transactions.unshift({
            date: `${dd}/${mm}/${yy} ${hh}:${mi}`,
            op: op, ticker: c.ticker, qty: q, price: c.price, total: total, cashAfter: cash
        });
        
        closeTrade();
        refreshCurrentTab();
        updateTotalBalance();
        showToast(`${op === "buy" ? "Compra" : "Venda"} de ${q} cotas de ${c.ticker} realizada com sucesso!`);
    }

    function renderDonutChart() {
        // Dados do gráfico de gastos mensais
        const gastos = [
            { nome: "Alimentação", valor: 1850.00, cor: "#ff6b6b" },
            { nome: "Moradia", valor: 3200.00, cor: "#4ecdc4" },
            { nome: "Transporte", valor: 450.00, cor: "#ffe66d" },
            { nome: "Lazer", valor: 680.00, cor: "#a8e6cf" },
            { nome: "Outros", valor: 420.00, cor: "#ffd93d" }
        ];
        
        const totalGastos = gastos.reduce((sum, item) => sum + item.valor, 0);
        
        // Calcular ângulos e porcentagens
        let currentAngle = 0;
        const segments = [];
        
        gastos.forEach((item, index) => {
            const angle = (item.valor / totalGastos) * 360;
            const percentage = (item.valor / totalGastos) * 100;
            segments.push({
                ...item,
                startAngle: currentAngle,
                endAngle: currentAngle + angle,
                percentage: percentage,
                index: index
            });
            currentAngle += angle;
        });
        
        // Criar SVG para o gráfico de rosca
        const size = 200;
        const center = size / 2;
        const radius = 80;
        const holeRadius = 40;
        
        let svgHtml = `<svg viewBox="0 0 ${size} ${size}" style="width: 100%; height: 100%;">`;
        
        segments.forEach(segment => {
            // Calcular coordenadas para o arco
            const startRad = (segment.startAngle * Math.PI) / 180;
            const endRad = (segment.endAngle * Math.PI) / 180;
            
            // Calcular pontos para o caminho do arco externo
            const x1 = center + radius * Math.cos(startRad);
            const y1 = center + radius * Math.sin(startRad);
            const x2 = center + radius * Math.cos(endRad);
            const y2 = center + radius * Math.sin(endRad);
            
            // Calcular pontos para o arco interno (buraco)
            const x3 = center + holeRadius * Math.cos(endRad);
            const y3 = center + holeRadius * Math.sin(endRad);
            const x4 = center + holeRadius * Math.cos(startRad);
            const y4 = center + holeRadius * Math.sin(startRad);
            
            const largeArcFlag = segment.endAngle - segment.startAngle > 180 ? 1 : 0;
            
            const pathData = `
                M ${x1} ${y1}
                A ${radius} ${radius} 0 ${largeArcFlag} 1 ${x2} ${y2}
                L ${x3} ${y3}
                A ${holeRadius} ${holeRadius} 0 ${largeArcFlag} 0 ${x4} ${y4}
                Z
            `;
            
            const percentageText = `${segment.percentage.toFixed(1)}%`;
            
            svgHtml += `
                <path d="${pathData}" 
                      fill="${segment.cor}" 
                      stroke="#0a0a0a" 
                      stroke-width="2"
                      data-category="${segment.nome}"
                      data-value="${segment.valor}"
                      data-percentage="${segment.percentage.toFixed(1)}"
                      onmouseover="highlightSegment(this, '${segment.nome}', '${segment.valor.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}', '${percentageText}')"
                      onmouseout="resetHighlight(this)"
                      style="cursor: pointer; transition: all 0.3s ease;">
                </path>
            `;
        });
        
        svgHtml += `</svg>`;
        
        // Gerar legendas com hover
        let legendHtml = `<div class="chart-legend">`;
        segments.forEach(segment => {
            const percentageText = `${segment.percentage.toFixed(1)}%`;
            legendHtml += `
                <div class="legend-item" 
                     onmouseover="highlightLegendItem('${segment.nome}', '${segment.valor.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}', '${percentageText}')"
                     onmouseout="resetLegendHighlight()">
                    <div class="legend-color" style="background: ${segment.cor};"></div>
                    <span class="legend-label">${segment.nome}</span>
                    <span class="legend-value">${segment.valor.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}</span>
                    <span class="legend-percent">(${percentageText})</span>
                </div>
            `;
        });
        
        legendHtml += `
            <div class="legend-item" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #333;">
                <div class="legend-color" style="background: transparent;"></div>
                <span class="legend-label" style="font-weight: 600;">Total</span>
                <span class="legend-value" style="color: #ffd700; font-size: 1rem;">${totalGastos.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}</span>
            </div>
        `;
        legendHtml += `</div>`;
        
        return {
            svg: svgHtml,
            legend: legendHtml,
            total: totalGastos
        };
    }

                    <div class="card-holder">${userData.nationalCard.holder}</div>
                    <div class="card-limit">💰 Limite total: ${userData.nationalCard.limit.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}<br>📊 Limite disponível: ${(userData.nationalCard.limit * 0.7).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}</div>
                </div>
                <button class="btn-secondary btn" id="openEditCardBtn" style="margin-top:15px;">⚙️ Gerenciar Cartão</button>
            </div>
            <div class="card">
                <div class="card-title">📊 Gastos Mensais</div>
                <div class="chart-container">
                    <div class="pie-chart-wrapper">
                        <div class="pie-chart" id="donutChart">
                            ${chart.svg}
                        </div>
                        <div class="chart-center" id="chartCenter">
                            <div class="chart-center-text">Gastos<br>Mensais</div>
                        </div>
                    </div>
                    ${chart.legend}
                </div>
            </div>
        `;
    }

    function renderInternational() {
        return `
            <div class="card">
                <div class="card-title"><span>🌎</span> Conta Internacional (USD)</div>
                <div class="card-amount">$ ${userData.internationalBalance.toFixed(2)} USD</div>
                <p style="font-size:0.8rem; color:#888;">Cotação: R$ 5,20 / USD</p>
                <button class="btn" id="simulateDepositInternational">+ Depositar</button>
                <button class="btn btn-secondary" id="simulateWithdrawInternational">- Sacar</button>
            </div>
            <div class="card">
                <div class="card-title"><span>💳</span> Cartão Internacional</div>
                <div class="credit-card">
                    <div class="card-brand">GLOBAL BANK</div>
                    <div class="card-number">${userData.internationalCard.number}</div>
                    <div class="card-details"><span>Válido até ${userData.internationalCard.expiry}</span><span>CVV ${userData.internationalCard.cvv}</span></div>
                    <div class="card-holder">${userData.internationalCard.holder}</div>
                    <div class="card-limit">💰 Limite total: $${userData.internationalCard.limit.toFixed(2)} USD<br>📊 Limite disponível: $${(userData.internationalCard.limit * 0.7).toFixed(2)} USD</div>
                </div>
                <button class="btn-secondary btn" id="openEditInternationalCardBtn" style="margin-top:15px;">⚙️ Gerenciar Cartão</button>
            </div>
        `;
    }

    function renderSuggestions() {
        const suggestions = [
            { id: 1, icon: "💰", title: "Aumente sua reserva de emergência", description: "Recomendamos ter R$ 15.000 em reserva. Você está a 65% da meta.", tag: "Prioridade alta" },
            { id: 2, icon: "📊", title: "Invista em Renda Fixa", description: "CDBs de bancos sólidos com rentabilidade de 110% do CDI.", tag: "Rentabilidade garantida" },
            { id: 3, icon: "🌍", title: "Diversificação Internacional", description: "ETFs como IVVB11 podem reduzir riscos.", tag: "Potencial de ganho" },
            { id: 4, icon: "🎯", title: "Meta: Aposentadoria aos 50 anos", description: "Você precisa investir R$ 2.500/mês.", tag: "Planejamento" },
        ];
        let html = `<div class="card"><div class="card-title"><span>💡</span> Sugestões Inteligentes</div>`;
        suggestions.forEach(sug => {
            html += `<div class="suggestion-item"><div class="suggestion-title"><span>${sug.icon}</span><span>${sug.title}</span></div><div class="suggestion-desc">${sug.description}</div><span class="suggestion-tag">🏷️ ${sug.tag}</span></div>`;
        });
        html += `</div>`;
        return html;
    }

    function renderProfile() {
        const totalInvested = Object.entries(portfolio).reduce((s,[t,p])=>{const c=COMPANIES.find(x=>x.ticker===t); return s+(c?c.price*p.qty:0);},0);
        const totalWealth = userData.nationalBalance + (userData.internationalBalance * 5.20) + totalInvested + cash;
        const initial = userData.profile.name.charAt(0).toUpperCase();
        return `
            <div class="card">
                <div class="profile-header"><div class="avatar">${initial}</div><div class="profile-info"><h3>${userData.profile.name}</h3><p>${userData.profile.email}</p><p>📱 ${userData.profile.phone}</p></div></div>
                <button class="btn" id="openEditProfileBtn" style="background:linear-gradient(135deg,#8b6914 0%,#b8860b 100%); color:#ffd700;">✏️ Editar Perfil</button>
            </div>
            <div class="card">
                <div class="card-title">📋 Informações Pessoais</div>
                <div class="info-row"><span class="info-label">🎯 Objetivo:</span><span class="info-value">${userData.profile.goal}</span></div>
                <div class="info-row"><span class="info-label">🏦 Desde:</span><span class="info-value">${userData.profile.since}</span></div>
                <div class="info-row"><span class="info-label">⭐ Nível:</span><span class="info-value">${userData.profile.level}</span></div>
            </div>
            <div class="card">
                <div class="card-title">💰 Resumo Financeiro</div>
                <div class="info-row"><span class="info-label">Patrimônio total:</span><span class="info-value" style="color:#ffd700;">${totalWealth.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}</span></div>
                <div class="info-row"><span class="info-label">Conta Nacional:</span><span class="info-value">${userData.nationalBalance.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}</span></div>
                <div class="info-row"><span class="info-label">Saldo Investimentos:</span><span class="info-value">${fmt(cash)}</span></div>
                <div class="info-row"><span class="info-label">Ações:</span><span class="info-value">${totalInvested.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' })}</span></div>
            </div>
        `;
    }

    // Funções globais para hover do gráfico
    window.highlightSegment = function(element, category, value, percentage) {
        // Resetar todos os paths primeiro
        const allPaths = document.querySelectorAll('#donutChart path');
        allPaths.forEach(path => {
            path.style.filter = 'brightness(1)';
            path.style.strokeWidth = '2';
        });
        
        // Destacar o segmento atual
        element.style.filter = 'brightness(1.2)';
        element.style.strokeWidth = '4';
        
        // Atualizar o centro do gráfico com as informações
        const centerDiv = document.getElementById('chartCenter');
        if (centerDiv) {
            centerDiv.innerHTML = `
                <div class="chart-center-text" style="background: rgba(0,0,0,0.9);">
                    ${category}<br>
                    <span style="font-size: 0.7rem;">${value}</span><br>
                    <span style="font-size: 0.65rem; color: #ffd700;">${percentage}</span>
                </div>
            `;
        }
        
        // Destacar item correspondente na legenda
        const legendItems = document.querySelectorAll('.legend-item');
        legendItems.forEach(item => {
            const label = item.querySelector('.legend-label');
            if (label && label.textContent === category) {
                item.style.background = 'rgba(218,165,32,0.2)';
                item.style.transform = 'translateX(5px)';
            } else if (label && label.textContent !== 'Total') {
                item.style.background = 'transparent';
                item.style.transform = 'translateX(0)';
            }
        });
    };
    
    window.resetHighlight = function(element) {
        // Resetar o segmento
        element.style.filter = 'brightness(1)';
        element.style.strokeWidth = '2';
        
        // Resetar o centro do gráfico
        const centerDiv = document.getElementById('chartCenter');
        if (centerDiv) {
            centerDiv.innerHTML = `<div class="chart-center-text">Gastos<br>Mensais</div>`;
        }
        
        // Resetar todos os itens da legenda
        const legendItems = document.querySelectorAll('.legend-item');
        legendItems.forEach(item => {
            const label = item.querySelector('.legend-label');
            if (label && label.textContent !== 'Total') {
                item.style.background = 'transparent';
                item.style.transform = 'translateX(0)';
            }
        });
    };
    
    window.highlightLegendItem = function(category, value, percentage) {
        // Encontrar e destacar o segmento correspondente no gráfico
        const allPaths = document.querySelectorAll('#donutChart path');
        allPaths.forEach(path => {
            const pathCategory = path.getAttribute('data-category');
            if (pathCategory === category) {
                path.style.filter = 'brightness(1.2)';
                path.style.strokeWidth = '4';
            } else {
                path.style.filter = 'brightness(1)';
                path.style.strokeWidth = '2';
            }
        });
        
        // Atualizar o centro do gráfico
        const centerDiv = document.getElementById('chartCenter');
        if (centerDiv) {
            centerDiv.innerHTML = `
                <div class="chart-center-text" style="background: rgba(0,0,0,0.9);">
                    ${category}<br>
                    <span style="font-size: 0.7rem;">${value}</span><br>
                    <span style="font-size: 0.65rem; color: #ffd700;">${percentage}</span>
                </div>
            `;
        }
    };
    
    window.resetLegendHighlight = function() {
        // Resetar todos os paths
        const allPaths = document.querySelectorAll('#donutChart path');
        allPaths.forEach(path => {
            path.style.filter = 'brightness(1)';
            path.style.strokeWidth = '2';
        });
        
        // Resetar o centro
        const centerDiv = document.getElementById('chartCenter');
        if (centerDiv) {
            centerDiv.innerHTML = `<div class="chart-center-text">Gastos<br>Mensais</div>`;
        }
    };

    function setupEventDelegation() {
        const contentArea = document.getElementById('contentArea');
        contentArea.addEventListener('click', (event) => {
            if (event.target.id === 'openEditCardBtn') openCardModal();
            if (event.target.id === 'openEditInternationalCardBtn') openInternationalCardModal();
            if (event.target.id === 'openEditProfileBtn') openProfileModal();
            if (event.target.id === 'simulateDepositNational') openNationalDepositModal();
            if (event.target.id === 'simulateWithdrawNational') openNationalWithdrawModal();
            if (event.target.id === 'simulateDepositInternational') openInternationalDepositModal();
            if (event.target.id === 'simulateWithdrawInternational') openInternationalWithdrawModal();
        });
    }

    function showToast(message, type = "success") {
        const toast = document.createElement('div');
        toast.innerText = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = type === 'error' ? '#8b0000' : '#b8860b';
        toast.style.color = '#ffd700';
        toast.style.padding = '12px 20px';
        toast.style.borderRadius = '30px';
        toast.style.zIndex = '2001';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    let currentTab = 'national';
    
    function refreshCurrentTab() {
        let htmlContent = '';
        if (currentTab === 'national') htmlContent = renderNational();
        else if (currentTab === 'international') htmlContent = renderInternational();
        else if (currentTab === 'investments') htmlContent = renderInvestments();
        else if (currentTab === 'suggestions') htmlContent = renderSuggestions();
        else if (currentTab === 'profile') htmlContent = renderProfile();
        document.getElementById('contentArea').innerHTML = htmlContent;
        
        if (currentTab === 'investments') {
            renderCompanyTabs();
            renderCarteira();
            renderExtrato();
            renderAI();
            setupChat();
        }
    }
    
    function switchTab(tabId) {
        currentTab = tabId;
        refreshCurrentTab();
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.getAttribute('data-tab') === tabId) item.classList.add('active');
            else item.classList.remove('active');
        });
    }
    
    function init() {
        updateTotalBalance();
        updateGreeting();
        switchTab('national');
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => { const tabId = item.getAttribute('data-tab'); if (tabId) switchTab(tabId); });
        });
        setupEventDelegation();
        document.getElementById('saveCardChanges')?.addEventListener('click', saveCardChanges);
        document.getElementById('saveInternationalCardChanges')?.addEventListener('click', saveInternationalCardChanges);
        document.getElementById('confirmEditProfile')?.addEventListener('click', saveProfileChanges);
        document.getElementById('confirmNationalTransaction')?.addEventListener('click', confirmNationalTransaction);
        document.getElementById('confirmInternationalTransaction')?.addEventListener('click', confirmInternationalTransaction);
        document.getElementById('editCardModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeCardModal(); });
        document.getElementById('editInternationalCardModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeInternationalCardModal(); });
        document.getElementById('editProfileModal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeProfileModal(); });
        document.getElementById('transactionModalNational')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeNationalTransactionModal(); });
        document.getElementById('transactionModalInternational')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeInternationalTransactionModal(); });
        document.getElementById('tradeQty')?.addEventListener('input', updateTradeTotal);
    }
    
    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
